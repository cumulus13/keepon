# keepon.ini — Configuration for keepon-gui
# ─────────────────────────────────────────────────────────────────────────────
# Candidate search order (first found wins):
#   Windows : %APPDATA%\keepon\keepon.ini
#   macOS   : ~/Library/Application Support/keepon/keepon.ini
#   Linux   : $XDG_CONFIG_HOME/keepon/keepon.ini  (default: ~/.config/keepon/)
#   Any OS  : ~/.keepon.ini
#   Any OS  : <executable dir>/keepon.ini
#   Any OS  : <cwd>/keepon.ini           ← this file (development / portable)
# ─────────────────────────────────────────────────────────────────────────────

[keepon]

# Start sleep prevention automatically on launch (true / false)
prevent_sleep = true

# How often (in seconds) SetThreadExecutionState is called to keep the system
# awake. 30 seconds is safe; lower values have no meaningful benefit.
heartbeat_interval = 30


[idle]

# Seconds of keyboard/mouse inactivity before idle actions trigger.
# Minimum useful value is ~10; typical values: 60, 120, 300.
idle_threshold = 60

# Comma-separated list of window title substrings.
# When the system is idle, every visible window whose title CONTAINS one of
# these strings (case-insensitive) is raised to the top of the Z-order WITHOUT
# changing its maximized / minimized / normal state and WITHOUT stealing focus
# from the currently active window.
#
# Examples:
#   bring_to_front_windows = Notepad, My Dashboard - Chrome, Terminal
#   bring_to_front_windows = Visual Studio Code
bring_to_front_windows = CTRACEBACK


[idle_commands]
# Shell commands to execute once each time the system enters the idle state.
# Commands are re-armed after user activity resumes, so they fire again on the
# next idle entry.  Each command runs in a detached subprocess (no console
# window on Windows).
#
# Format:  <unique_key> = <command>
#   The key name is arbitrary — it just needs to be unique within this section.
#
# Examples:
#   log_idle    = echo %DATE% %TIME% idle >> C:\keepon_idle.log
#   ping_server = curl -s https://example.com/heartbeat
#   run_script  = python C:\scripts\on_idle.py


[logging]

# Log level: DEBUG | INFO | WARNING | ERROR
level = INFO

# Optional path for a log file.  Leave blank to write to stdout only.
# Example: file = C:\Users\you\AppData\Local\keepon\keepon.log
file =
